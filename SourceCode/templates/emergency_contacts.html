<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Contacts</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Emergency Contacts</h1>
        <div id="contacts"></div>
    </div>

    <script>
        const data = [
            {
                "type": "Hospital",
                "name": "City General Hospital",
                "contact": "108",
                "location": "City Center",
                "logo": "/static/emergency_contacts_images/HOSPITAL.jpg",
                "link": ""
            },
            {
                "type": "Fire Service",
                "name": "Central Fire Department",
                "contact": "102",
                "location": "Down Town",
                "logo": "/static/emergency_contacts_images/FIRE.jpg",
                "link": ""
            },
            {
                "type": "Relief Organization",
                "name": "PMNRF",
                "contact": "1800-180-1253",
                "location": "Country-wide",
                "logo": "/static/emergency_contacts_images/RELIEF.jpg",
                "link": "https://pmnrf.gov.in/"
            },
            {
                "type": "Police",
                "name": "City Police Station",
                "contact": "100",
                "location": "City wide",
                "logo": "/static/emergency_contacts_images/POLICE.jpg",
                "link": ""
            }
        ];

        const container = document.getElementById('contacts');
        data.forEach(contact => {
            container.innerHTML += `
                <div class="card mb-3">
                    <div class="card-body d-flex align-items-center">
                        <img src="${contact.logo}" alt="${contact.type} Logo" class="img-fluid" style="max-width: 80px; height: 80px; margin-right: 15px;">
                        <div>
                            <h5 class="card-title">${contact.type}</h5>
                            <p class="card-text"><strong>Name:</strong> ${contact.name}</p>
                            <p class="card-text"><strong>Contact:</strong> ${contact.contact}</p>
                            <p class="card-text"><strong>Location:</strong> ${contact.location}</p>
                            <div>
                                ${contact.link ? `<a href="${contact.link}" class="btn btn-primary" target="_blank">Visit Website</a>` : ''}
                                <a href="tel:${contact.contact}" class="btn btn-success">Call</a>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
    </script>
</body>
</html>
