<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Emergency Contacts</title>
    <link rel="stylesheet" href="/static/css/main.css" />
    <noscript><link rel="stylesheet" href="/static/css/noscript.css" /></noscript>
</head>
<body class="is-preload">

    <!-- Header -->
    <header id="header">
        <a href="{{ url_for('emergency_contacts') }}" class="title">Emergency Contacts | Sahay</a>
        <nav>
            <ul>
                <li><a href="/"">Home</a></li>
                <!--<li><a href="contacts.html" class="active">Contacts</a></li> -->
                <!-- <li><a href="about.html">About</a></li> -->
            </ul>
        </nav>
    </header>

    <!-- Wrapper -->
    <div id="wrapper">

        <!-- Main -->
        <section id="main" class="wrapper">
            <div class="inner">
                <h1 class="major">Emergency Contacts</h1>
                <div id="contacts" class="style2"></div>
            </div>
        </section>

    </div>

    <!-- Footer -->
    <footer id="footer" class="wrapper alt">
        <div class="inner">
            <ul class="menu">
                <li>Made by EPICS348</li>
            </ul>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/jquery.scrollex.min.js"></script>
    <script src="/static/js/jquery.scrolly.min.js"></script>
    <script src="/static/js/browser.min.js"></script>
    <script src="/static/js/breakpoints.min.js"></script>
    <script src="/static/js/util.js"></script>
    <script src="/static/js/main.js"></script>

    <script>
        const data = [
            {
                "type": "Hospital",
                "name": "City General Hospital",
                "contact": "108",
                "location": "City Center",
                "logo": "/static/images/emergency_contacts_images/HOSPITAL.jpg",
                "link": ""
            },
            {
                "type": "Fire Service",
                "name": "Central Fire Department",
                "contact": "102",
                "location": "Down Town",
                "logo": "/static/images/emergency_contacts_images/FIRE.jpg",
                "link": ""
            },
            {
                "type": "Relief Organization",
                "name": "PMNRF",
                "contact": "1800-180-1253",
                "location": "Country-wide",
                "logo": "/static/images/emergency_contacts_images/RELIEF.jpg",
                "link": "https://pmnrf.gov.in/"
            },
            {
                "type": "Police",
                "name": "City Police Station",
                "contact": "100",
                "location": "City wide",
                "logo": "/static/images/emergency_contacts_images/POLICE.jpg",
                "link": ""
            }
        ];

        const container = document.getElementById('contacts');
        data.forEach(contact => {
            container.innerHTML += `
                <section>
                    <div class="box">
                        <div class="row gtr-50 gtr-uniform">
                            <div class="col-3">
                                <img src="${contact.logo}" alt="${contact.type} Logo" class="image fit" />
                            </div>
                            <div class="col-9">
                                <h3>${contact.type}</h3>
                                <p><strong>Name:</strong> ${contact.name}</p>
                                <p><strong>Contact:</strong> ${contact.contact}</p>
                                <p><strong>Location:</strong> ${contact.location}</p>
                                <ul class="actions">
                                    ${contact.link ? `<li><a href="${contact.link}" class="button primary" target="_blank">Visit Website</a></li>` : ''}
                                    <li><a href="tel:${contact.contact}" class="button">Call</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </section>`;
        });
    </script>

</body>
</html>
