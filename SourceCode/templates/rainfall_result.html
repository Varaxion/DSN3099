<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Rainfall Analysis</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="/static/css/main.css" />
    <noscript><link rel="stylesheet" href="/static/css/noscript.css" /></noscript>
</head>

<body class="is-preload">

    <!-- Header -->
    <header id="header">
        <a href="{{ url_for('rainfall_result') }}" class="title">Rainfall Analysis</a>
        <nav>
            <ul>
                <li><a href="{{ url_for('rainfall_result') }}" class="active">Back</a></li>
            </ul>
        </nav>
    </header>

    <!-- Wrapper -->
    <div id="wrapper">

        <!-- Main Section -->
        <section id="main" class="wrapper">
            <div class="inner">
                <h1 class="major">Rainfall Analysis</h1>

                <!-- Results Table -->
                <div class="row">
                    <div class="col-6 col-12-medium">
                        <div class="table-wrapper">
                            <table class="alt">
                                <thead>
                                    <tr>
                                        <th>Properties:</th>
                                        <th>Result</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>Mean Absolute Error</td>
                                        <td>{{ Mae }}</td>
                                    </tr>
                                    <tr>
                                        <td>Accuracy Score</td>
                                        <td>{{ Score }}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Image -->
                    <div class="col-6 col-12-medium">
                        <span class="image fit">
                            <img src="{{ url_for('static', filename='images/rainfall_image/rainfall.png') }}" alt="Rainfall Analysis Image" />
                        </span>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <!-- Footer -->
    <footer id="footer" class="wrapper alt">
        <div class="inner">
            <ul class="menu">
                <li>&copy; Rainfall Project. All rights reserved.</li>
                <li>Design: <a href="http://html5up.net">HTML5 UP</a></li>
            </ul>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/jquery.scrollex.min.js"></script>
    <script src="/static/js/jquery.scrolly.min.js"></script>
    <script src="/static/js/browser.min.js"></script>
    <script src="/static/js/breakpoints.min.js"></script>
    <script src="/static/js/util.js"></script>
    <script src="/static/js/main.js"></script>

</body>
</html>
